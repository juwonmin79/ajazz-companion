<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background with rounded corners -->
  <defs>
    <clipPath id="roundedRect">
      <rect width="1024" height="1024" rx="220" ry="220"/>
    </clipPath>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2a4a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0d1b35;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mouseGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e8eef8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#b0c4de;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4da6ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0066cc;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
    </filter>
    <filter id="glow">
      <feDropShadow dx="0" dy="0" stdDeviation="12" flood-color="#4da6ff" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" ry="220" fill="url(#bgGrad)"/>


  <g filter="url(#glow)" clip-path="url(#roundedRect)">
    <!-- Top arc arrow (clockwise, top-right) -->
    <path d="M 512 230 A 282 282 0 0 1 794 512" 
          fill="none" stroke="url(#arrowGrad)" stroke-width="44" 
          stroke-linecap="round" opacity="0.9"/>
    <!-- Bottom arc arrow (clockwise, bottom-left) -->
    <path d="M 512 794 A 282 282 0 0 1 230 512" 
          fill="none" stroke="url(#arrowGrad)" stroke-width="44" 
          stroke-linecap="round" opacity="0.9"/>
  </g>

  <!-- Mouse body -->
  <g filter="url(#shadow)" clip-path="url(#roundedRect)">
    <!-- Mouse outer body -->
    <rect x="407" y="312" width="210" height="310" rx="105" ry="105" 
          fill="url(#mouseGrad)"/>
    
    <!-- Center divider line -->
    <line x1="512" y1="312" x2="512" y2="452" 
          stroke="#8899bb" stroke-width="8" opacity="0.6"/>
    
    <!-- Scroll wheel -->
    <rect x="497" y="378" width="30" height="70" rx="15" ry="15" 
          fill="#8899bb" opacity="0.7"/>
    
    <!-- Left button highlight -->
    <path d="M 407 422 Q 407 312 512 312 L 512 452 Q 450 452 407 422 Z" 
          fill="white" opacity="0.15"/>
  </g>
</svg>
